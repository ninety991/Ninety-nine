<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninety9 Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:Poppins;
background:#000 url("2d.png") center/cover no-repeat;
color:white;
text-align:center;
}
/* LOADING */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#loader img{
width:140px;
animation:spin 3s linear infinite;
}
.instagram{
font-size:36px;
font-weight:800;
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}
.instagram img{width:34px;}
.logo img{
width:110px;
animation:spin 6s linear infinite;
}
@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
.clock{
font-size:24px;
margin:10px 0 30px;
}
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
width:90%;
margin:auto;
}
.card{
background:#111;
border-radius:20px;
padding:15px;
}
.card img{
width:100%;
border-radius:15px;
}
button{
background:silver;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:600;
}
.cart{
width:90%;
margin:40px auto;
background:#111;
padding:20px;
border-radius:20px;
}
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
top:0;
left:0;
justify-content:center;
align-items:center;
}
.modal-box{
position:relative;
background:#111;
padding:25px;
border-radius:20px;
width:330px;
text-align:left;
}
.close-btn{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
cursor:pointer;
font-weight:bold;
}
.size-btn{
padding:8px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#333;
color:white;
}
.color-btn.black{background:black;}
.color-btn.white{background:white;color:black;}
.thanks{
background:black;
border:1px solid silver;
padding:20px;
border-radius:15px;
margin-top:20px;
text-align:center;
}
.thanks img{
width:70px;
margin-bottom:10px;
}
#promoMessage{
font-size:12px;
color:lightgreen;
margin-top:5px;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
<img src="3d.png">
</div>

<div class="instagram">
<img src="ig.png">
Ninety9.egy
</div>

<div class="logo">
<img src="3d.png">
</div>

<div class="clock" id="clock"></div>

<div class="products" id="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total: <span id="total">0</span> EGP</p>
<button id="checkoutBtn">Checkout</button>
</div>

<!-- اختيار المنتج -->
<div class="modal" id="productModal">
<div class="modal-box">
<button class="close-btn" onclick="productModal.style.display='none'">X</button>
<h3 id="productName"></h3>
<div id="sizeSection">
<p>Size</p>
<button class="size-btn">S</button>
<button class="size-btn">M</button>
<button class="size-btn">L</button>
</div>
<button id="addToCart">Add To Cart</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-box">

<form id="checkoutForm">

<input placeholder="Full Name" id="name" required>
<br><br>

<input placeholder="Phone Number" id="phone" required>
<br><br>

<select id="gov" required>
<option value="">Governorate</option>
<option value="Giza">Giza</option>
<option value="Cairo">Cairo</option>
</select>
<br><br>

<select id="area" required>
<option value="">Area</option>
</select>
<br><br>

<textarea placeholder="Full Address" id="address" required></textarea>
<br><br>

<input placeholder="Building / Villa Number" id="building" required>
<br><br>

<input placeholder="Apartment Number" id="apartment" required>
<br><br>

<input placeholder="Promo Code" id="promo">
<p id="promoMessage"></p>
<br>

<input value="E-Wallet Only" readonly>
<br><br>

<p style="display:flex;align-items:center;gap:10px;">
<img src="e.png" width="22">
01144108775
</p>

<br>

<input type="file" required>
<br><br>

<p id="shipping"></p>

<button>Confirm Order</button>

</form>

<div id="thanksBox"></div>

</div>
</div>

<script>

/* LOADER */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1200);
});

/* الساعة */
setInterval(()=>{
const d=new Date();
clock.innerText=d.toLocaleTimeString();
},1000);

/* المنتجات */
const products=[
{name:"T-shirt 99",price:650,img:"W.jpg",sizes:["S","M","L"],colors:["Black"],type:"tshirt"},
{name:"Sweet Pants 99",price:750,img:"Sweet.png",sizes:["S","M","L"],colors:["Black"],type:"pants"},
{name:"99 Chain",price:750,img:"C.jpg",sizes:[],colors:[],type:"chain"},
{name:"White 99 T-shirt",price:650,img:"W.jpg",sizes:["S","M","L"],colors:["Black"],type:"tshirt"},
{name:"99 Black Flag",price:500,img:"F.jpg",sizes:[],colors:[],type:"flag"}
];

let cart=[];
let currentProduct=null;
let selectedSize="";
let selectedColor="Black";

const productsContainer=document.getElementById("products");

/* عرض المنتجات */
products.forEach(p=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} EGP</p>
<button onclick="selectProduct('${p.name}')">Select</button>
`;
productsContainer.appendChild(div);
});

function selectProduct(name){
currentProduct=products.find(p=>p.name===name);
productName.innerText=currentProduct.name;

if(currentProduct.type==="chain" || currentProduct.type==="flag"){
  selectedSize="One Size";
  selectedColor="Black";
  cart.push({...currentProduct,size:selectedSize,color:selectedColor,price:currentProduct.price});
  renderCart();
}else if(currentProduct.type==="tshirt"){
  selectedColor="Black";
  productModal.style.display="flex";
  document.getElementById("sizeSection").style.display="block";
}else{
  // pants
  selectedColor="Black";
  selectedSize="S";
  productModal.style.display="flex";
}
}

/* اختيار المقاسات */
document.querySelectorAll(".size-btn").forEach(b=>{
b.onclick=()=>selectedSize=b.innerText;
});

/* اللون ثابت أسود */
document.querySelectorAll(".color-btn").forEach(b=>{
b.onclick=()=>selectedColor="Black";
});

addToCart.onclick=()=>{
let finalPrice=currentProduct.price;
let originalPrice=currentProduct.price;

let promo=document.getElementById("promo").value.trim().toUpperCase();
let promoMessage=document.getElementById("promoMessage");

if(promo==="N99"){
finalPrice=Math.round(finalPrice*0.8);
promoMessage.innerText="Promo code applied – 20% off";
promoMessage.style.color="lightgreen";
}else{
promoMessage.innerText="";
}

cart.push({...currentProduct,size:selectedSize,color:selectedColor,price:finalPrice,originalPrice:originalPrice});
renderCart();
productModal.style.display="none";
};

/* ريندر الكارت */
function renderCart(){
cartItems.innerHTML="";
let total=0;
cart.forEach(i=>{
total+=i.price;
let priceText=i.originalPrice && i.originalPrice!==i.price ? ` (was ${i.originalPrice})`:"";
cartItems.innerHTML+=`<p>${i.name} - ${i.size} - ${i.color} - ${i.price} EGP ${priceText}</p>`;
});
document.getElementById("total").innerText=total;
}

/* فتح التشيك اوت */
checkoutBtn.onclick=()=>{
checkoutModal.style.display="flex";
};

/* المناطق */
const areas={
Giza:["6th of October","El Shikh Zayed","El Zamalek","El Agouza","El Dokki","Embaba","Bolaq El Dakrour","Bolaq Abu El Ella"],
Cairo:["Tgamoo","Nasr City","Maadi"]
};
gov.onchange=()=>{
area.innerHTML='<option value="">Area</option>';
areas[gov.value].forEach(a=>{
let opt=document.createElement("option");
opt.textContent=a;
area.appendChild(opt);
});
};

/* سعر التوصيل */
gov.addEventListener("change",()=>{
let ship=gov.value==="Giza"?50:75;
shipping.innerText="Shipping: "+ship+" EGP";
});

/* ارسال واتساب */
checkoutForm.onsubmit=(e)=>{
e.preventDefault();

let ship=gov.value==="Giza"?50:75;
let total=cart.reduce((s,i)=>s+i.price,0)+ship;

let msg=`New Order - Ninety9 Store

Customer Info
Name: ${name.value}
Phone: ${phone.value}

Location
Governorate: ${gov.value}
Area: ${area.value}
Address: ${address.value}
Building: ${building.value}
Apartment: ${apartment.value}

Order Details
`;

cart.forEach(p=>{
let priceText=p.originalPrice && p.originalPrice!==p.price ? ` (was ${p.originalPrice})`:"";
let promoUsed=p.originalPrice && p.originalPrice!==p.price ? " | Promo code applied":"";
msg+=`${p.name} | Size: ${p.size} | Color: ${p.color} | ${p.price} EGP${priceText}${promoUsed}
`;
});

msg+=`
Shipping: ${ship} EGP
Total: ${total} EGP
`;

const number="01144108775";
window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);

thanksBox.innerHTML=`
<div class="thanks">
<img src="3d.png">
<p>Thank you for your trust in 99</p>
</div>
`;

cart=[];
renderCart();
};
</script>

</body>
</html>
