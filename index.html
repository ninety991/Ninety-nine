<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninety9 Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Poppins;background:#000 url("2d.png") center/cover no-repeat;color:white;text-align:center;}
/* LOADING */
#loader{position:fixed;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:9999;}
#loader img{width:140px;animation:spin 3s linear infinite;}
.instagram{font-size:36px;font-weight:800;margin-top:20px;display:flex;justify-content:center;align-items:center;gap:10px;}
.instagram img{width:34px;}
.logo img{width:110px;animation:spin 6s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.clock{font-size:24px;margin:10px 0 30px;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:90%;margin:auto;}
.card{background:#111;border-radius:20px;padding:15px;}
.card img{width:100%;border-radius:15px;}
button{background:silver;border:none;padding:10px;border-radius:10px;cursor:pointer;margin-top:10px;font-weight:600;}
.cart{width:90%;margin:40px auto;background:#111;padding:20px;border-radius:20px;}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.9);top:0;left:0;justify-content:center;align-items:center;}
.modal-box{background:#111;padding:25px;border-radius:20px;width:330px;text-align:left;position:relative;}
.size-btn,.color-btn{padding:8px 12px;margin:5px;border:none;border-radius:8px;cursor:pointer;}
.size-btn{background:#333;color:white;}
.color-btn.black{background:black;}
.color-btn.white{background:white;color:black;}
.thanks{background:black;border:1px solid silver;padding:20px;border-radius:15px;margin-top:20px;text-align:center;}
.thanks img{width:70px;margin-bottom:10px;}
.quantity-btn{padding:5px 10px;margin:0 5px;background:#555;color:white;border-radius:5px;}
.close-btn{position:absolute;top:10px;right:10px;background:red;color:white;font-weight:bold;border-radius:50%;width:25px;height:25px;border:none;cursor:pointer;}
.promo-success{color:#0f0;font-size:12px;margin-top:5px;}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader"><img src="3d.png"></div>

<div class="instagram"><img src="ig.png">Ninety9.egy</div>
<div class="logo"><img src="3d.png"></div>
<div class="clock" id="clock"></div>

<div class="products" id="products"></div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<p>Total: <span id="total">0</span> EGP</p>

<input placeholder="Promo Code" id="promoCode"><button id="applyPromo">OK</button>
<p id="promoMsg" class="promo-success"></p>

<button id="checkoutBtn">Checkout</button>
</div>

<!-- اختيار المنتج -->
<div class="modal" id="productModal">
<div class="modal-box">
<button class="close-btn" onclick="closeModal()">X</button>
<h3 id="productName"></h3>
<p id="sizeSection">Size</p>
<div id="sizeBtns"></div>
<p id="colorSection">Color</p>
<div id="colorBtns"></div>
<p>Quantity: <button class="quantity-btn" onclick="changeQty(-1)">-</button> <span id="qty">1</span> <button class="quantity-btn" onclick="changeQty(1)">+</button></p>
<button id="addToCart">Add To Cart</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="modal" id="checkoutModal">
<div class="modal-box">
<form id="checkoutForm">
<input placeholder="Full Name" id="name" required><br><br>
<input placeholder="Phone Number" id="phone" required><br><br>
<select id="gov" required>
<option value="">Governorate</option>
<option value="Giza">Giza</option>
<option value="Cairo">Cairo</option>
</select><br><br>
<select id="area" required><option value="">Area</option></select><br><br>
<textarea placeholder="Full Address" id="address" required></textarea><br><br>
<input placeholder="Building / Villa Number" id="building" required><br><br>
<input placeholder="Apartment Number" id="apartment" required><br><br>
<input value="E-Wallet Only" readonly><br><br>
<p style="display:flex;align-items:center;gap:10px;"><img src="e.png" width="22">01144108775</p><br>
<input type="file" required><br><br>
<p id="shipping"></p>
<button>Confirm Order</button>
</form>
<div id="thanksBox"></div>
</div>
</div>

<script>
/* LOADER */
window.addEventListener("load",()=>{setTimeout(()=>{document.getElementById("loader").style.display="none";},1200);});

/* CLOCK */
setInterval(()=>{const d=new Date();clock.innerText=d.toLocaleTimeString();},1000);

/* PRODUCTS */
const products=[
{name:"99 T-shirt",price:650,img:"T.png",sizes:["S","M","L"],color:false},
{name:"Sweet Pants 99",price:750,img:"W.jpg",sizes:["S","M","L"],color:false},
{name:"99 chain",price:750,img:"C.jpg",sizes:false,color:false},
{name:"White 99 T-shirt",price:650,img:"W.jpg",sizes:["S","M","L"],color:false},
{name:"99 black flag",price:500,img:"F.jpg",sizes:false,color:false}
];

let cart=[];let currentProduct=null;let selectedSize="S";let selectedColor="Black";let qty=1;let promoApplied=false;

const productsContainer=document.getElementById("products");

/* DISPLAY PRODUCTS */
products.forEach((p,i)=>{
const div=document.createElement("div");div.className="card";
div.innerHTML=`<img src="${p.img}"><h3>${p.name}</h3><p>${p.price} EGP</p>`;
if(p.sizes||p.color||p.name!=="99 chain"){div.innerHTML+=`<button onclick="openProduct(${i})">Select</button>`;}else{div.innerHTML+=`<button onclick="addDirect(${i})">Add To Cart</button>`;}
productsContainer.appendChild(div);
});

/* OPEN PRODUCT MODAL */
function openProduct(index){
currentProduct=products[index];qty=1;
productName.innerText=currentProduct.name;
document.getElementById("qty").innerText=qty;
sizeBtns.innerHTML="";colorBtns.innerHTML="";
if(currentProduct.sizes){
currentProduct.sizes.forEach(s=>{let b=document.createElement("button");b.className="size-btn";b.innerText=s;b.onclick=()=>selectedSize=s;sizeBtns.appendChild(b);});
sizeSection.style.display="block";
}else{sizeSection.style.display="none";}
if(currentProduct.color){colorBtns.innerHTML=`<button class="color-btn black" onclick="selectedColor='Black'"></button>`; colorSection.style.display="block";}else{colorSection.style.display="none";}
productModal.style.display="flex";
}

/* DIRECT ADD */
function addDirect(index){
let p=products[index];
cart.push({...p,qty:1});renderCart();
}

/* CLOSE MODAL */
function closeModal(){productModal.style.display="none";}

/* QUANTITY */
function changeQty(amount){qty+=amount;if(qty<1)qty=1;document.getElementById("qty").innerText=qty;}

/* ADD TO CART */
addToCart.onclick=()=>{
cart.push({...currentProduct,size:selectedSize,color:selectedColor,qty:qty});renderCart();closeModal();
};

/* RENDER CART */
function renderCart(){
cartItems.innerHTML="";let total=0;
cart.forEach((i)=>{
let itemTotal=i.price*i.qty;total+=itemTotal;
cartItems.innerHTML+=`<p>${i.name}${i.sizes?` - ${i.size}`:""}${i.color?` - ${i.color}`:""} x${i.qty} - ${itemTotal} EGP</p>`;
});let displayTotal=total;if(promoApplied)displayTotal=(total*0.8).toFixed(0);document.getElementById("total").innerText=displayTotal;
}

/* PROMO CODE */
applyPromo.onclick=()=>{
let code=document.getElementById("promoCode").value.trim().toUpperCase();
if(code==="N99"){promoApplied=true;promoMsg.innerText="Promo code activated! 20% off applied";renderCart();}
else{promoApplied=false;promoMsg.innerText="Invalid code";}
};

/* CHECKOUT MODAL */
checkoutBtn.onclick=()=>{checkoutModal.style.display="flex";};

/* AREAS */
const areas={Giza:["6th of October","El Shikh Zayed","El Zamalek","El Agouza","El Dokki","Embaba","Bolaq El Dakrour","Bolaq Abu El Ella"],Cairo:["Tgamoo","Nasr City","Maadi"]};
gov.onchange=()=>{area.innerHTML='<option value="">Area</option>';areas[gov.value].forEach(a=>{let opt=document.createElement("option");opt.textContent=a;area.appendChild(opt);});};

/* SHIPPING */
gov.addEventListener("change",()=>{let ship=gov.value==="Giza"?50:75;shipping.innerText="Shipping: "+ship+" EGP";});

/* SUBMIT ORDER */
checkoutForm.onsubmit=(e)=>{
e.preventDefault();
let ship=gov.value==="Giza"?50:75;
let total=cart.reduce((s,i)=>s+s+i.price*i.qty,0)+ship;
let totalBefore=cart.reduce((s,i)=>s+s+i.price*i.qty,0)+ship;
if(promoApplied)total=(totalBefore*0.8+ship*0).toFixed(0);
let msg=`New Order - Ninety9 Store
Customer Info
Name: ${name.value}
Phone: ${phone.value}

Location
Governorate: ${gov.value}
Area: ${area.value}
Address: ${address.value}
Building: ${building.value}
Apartment: ${apartment.value}

Order Details
`;
cart.forEach(p=>{msg+=`${p.name}${p.sizes?` | Size: ${p.size}`:""}${p.color?` | Color: ${p.color}`:""} | Qty: ${p.qty} | Price: ${p.price} EGP\n`;});
if(promoApplied)msg+=`Promo Code Applied: N99\nTotal Before Discount: ${totalBefore} EGP\nTotal After Discount: ${total} EGP\n`;
msg+=`Shipping: ${ship} EGP\nTotal: ${total} EGP`;
const number="01144108775";
window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);
thanksBox.innerHTML=`<div class="thanks"><img src="3d.png"><p>Thank you for your trust in 99</p></div>`;
cart=[];renderCart();
};
</script>
</body>
</html>
